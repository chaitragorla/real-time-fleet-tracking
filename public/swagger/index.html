<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Traceify GPS API Interactive Playground</title>
    <!-- Load Swagger UI styles -->
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
    <link rel="icon" type="image/png" href="https://unpkg.com/swagger-ui-dist@5.11.0/favicon-32x32.png" sizes="32x32" />
    <style>
      html {
        box-sizing: border-box;
        overflow-y: scroll;
        background-color: #09090b;
      }
      *, *:before, *:after {
        box-sizing: inherit;
      }
      body {
        margin: 0;
        background-color: #09090b;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      
      /* Premium Dark Theme Overrides for Swagger UI */
      .swagger-ui {
        background-color: #09090b;
        color: #e4e4e7;
        padding-bottom: 50px;
      }
      .swagger-ui .info {
        margin: 40px 0;
      }
      .swagger-ui .info .title, 
      .swagger-ui .info h2,
      .swagger-ui .info p,
      .swagger-ui .info a {
        color: #ffffff !important;
      }
      .swagger-ui .info td {
        color: #a1a1aa !important;
      }
      .swagger-ui .scheme-container {
        background-color: #0f0f13 !important;
        border: 1px solid #1f1f2e !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
        border-radius: 16px;
        margin: 20px 0;
      }
      .swagger-ui select {
        background-color: #18181b !important;
        color: #e4e4e7 !important;
        border: 1px solid #27272a !important;
        border-radius: 8px !important;
      }
      .swagger-ui .opblock {
        border-radius: 14px !important;
        background-color: #121216 !important;
        border: 1px solid #1f1f27 !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
        margin-bottom: 15px !important;
      }
      .swagger-ui .opblock .opblock-summary {
        border-bottom: 0px !important;
        padding: 12px 20px !important;
      }
      .swagger-ui .opblock-tag {
        color: #e4e4e7 !important;
        border-bottom: 1px solid #1f1f27 !important;
        font-family: inherit;
        font-size: 1.4rem;
        padding: 20px 0 10px 0 !important;
      }
      .swagger-ui .opblock-tag:hover {
        background: transparent !important;
      }
      .swagger-ui .opblock .opblock-summary-method {
        border-radius: 8px !important;
        font-weight: 800 !important;
        padding: 6px 12px !important;
        text-shadow: none !important;
      }
      .swagger-ui .opblock-summary-path,
      .swagger-ui .opblock-summary-description {
        color: #e4e4e7 !important;
        font-weight: 500 !important;
      }
      .swagger-ui .opblock-body pre.microlight {
        background: #09090b !important;
        border: 1px solid #27272a !important;
        border-radius: 10px !important;
        color: #38bdf8 !important;
      }
      .swagger-ui .opblock-body {
        background: #141419 !important;
        border-top: 1px solid #1f1f27 !important;
        padding: 20px !important;
      }
      .swagger-ui .btn {
        background-color: #18181b !important;
        color: #e4e4e7 !important;
        border: 1px solid #27272a !important;
        border-radius: 10px !important;
        box-shadow: none !important;
        transition: all 0.2s;
      }
      .swagger-ui .btn:hover {
        background-color: #27272a !important;
        border-color: #3f3f46 !important;
        color: #ffffff !important;
      }
      .swagger-ui .btn.authorize {
        background: linear-gradient(135deg, #06b6d4, #8b5cf6) !important;
        border: 0 !important;
        color: #ffffff !important;
        font-weight: bold !important;
        border-radius: 10px !important;
      }
      .swagger-ui .btn.authorize svg {
        fill: #ffffff !important;
      }
      .swagger-ui .opblock .opblock-summary-operation-id, 
      .swagger-ui .opblock .opblock-summary-path, 
      .swagger-ui .opblock .opblock-summary-path__deprecated {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace !important;
      }
      .swagger-ui .tabli button {
        color: #e4e4e7 !important;
      }
      .swagger-ui .response-col_status {
        color: #ffffff !important;
        font-weight: bold !important;
      }
      .swagger-ui table thead tr td, 
      .swagger-ui table thead tr th {
        color: #e4e4e7 !important;
        border-bottom: 2px solid #27272a !important;
      }
      .swagger-ui .parameter__name, 
      .swagger-ui .parameter__type,
      .swagger-ui .parameter__in {
        color: #ffffff !important;
      }
      .swagger-ui .parameter__name.required:after {
        color: #ef4444 !important;
      }
      .swagger-ui input[type=text] {
        background: #09090b !important;
        border: 1px solid #27272a !important;
        color: #ffffff !important;
        border-radius: 8px !important;
        padding: 8px 12px !important;
      }
      .swagger-ui .model-box {
        background: #09090b !important;
        border: 1px solid #27272a !important;
        padding: 10px !important;
        border-radius: 8px !important;
      }
      .swagger-ui .model {
        color: #a1a1aa !important;
      }
      .swagger-ui .prop-type {
        color: #a855f7 !important;
      }
      .swagger-ui .opblock-description-wrapper p, 
      .swagger-ui .opblock-external-docs-wrapper p, 
      .swagger-ui .opblock-title_normal p {
        color: #a1a1aa !important;
      }
      
      /* Color schemes for specific method styles */
      .swagger-ui .opblock.opblock-get {
        border-color: rgba(59, 130, 246, 0.3) !important;
        background-color: rgba(59, 130, 246, 0.03) !important;
      }
      .swagger-ui .opblock.opblock-get .opblock-summary-method {
        background-color: #3b82f6 !important;
      }
      
      .swagger-ui .opblock.opblock-post {
        border-color: rgba(16, 185, 129, 0.3) !important;
        background-color: rgba(16, 185, 129, 0.03) !important;
      }
      .swagger-ui .opblock.opblock-post .opblock-summary-method {
        background-color: #10b981 !important;
      }
      
      .swagger-ui .opblock.opblock-put {
        border-color: rgba(245, 158, 11, 0.3) !important;
        background-color: rgba(245, 158, 11, 0.03) !important;
      }
      .swagger-ui .opblock.opblock-put .opblock-summary-method {
        background-color: #f59e0b !important;
      }
      
      .swagger-ui .opblock.opblock-delete {
        border-color: rgba(239, 68, 68, 0.3) !important;
        background-color: rgba(239, 68, 68, 0.03) !important;
      }
      .swagger-ui .opblock.opblock-delete .opblock-summary-method {
        background-color: #ef4444 !important;
      }
      
      /* Hide standard download/top bar buttons */
      .swagger-ui .download-url-wrapper {
        display: none !important;
      }
      .swagger-ui .topbar {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <!-- Load Swagger UI scripts -->
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js" charset="UTF-8"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js" charset="UTF-8"></script>
    <script>
      window.onload = function() {
        const ui = SwaggerUIBundle({
          url: "./openapi.json",
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset
          ],
          plugins: [
            SwaggerUIBundle.plugins.DownloadUrl
          ],
          layout: "BaseLayout", // Use BaseLayout to hide the standalone top bar
          persistAuthorization: true
        });
        window.ui = ui;
      };
    </script>
  </body>
</html>
